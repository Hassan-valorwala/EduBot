<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBot — College Assistant</title>
    <style>
    /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f0e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ===== MAIN CHAT CONTAINER ===== */
        .chat-container {
            width: 100%;
            max-width: 780px;
            background: #fffdf9;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(180, 160, 120, 0.18);
            display: flex;
            flex-direction: column;
            height: 90vh;
            overflow: hidden;
            border: 1px solid #e8dfc8;
        }

        /* ===== HEADER ===== */
        .chat-header {
            background: #fff8ee;
            color: #5a4a2f;
            padding: 20px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #e8dfc8;
        }

        .bot-avatar {
            width: 48px;
            height: 48px;
            background: #f0e6d0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 2px solid #d4c4a0;
        }

        .header-info h1 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #4a3820;
        }

        .header-info p {
            font-size: 0.85rem;
            color: #8a7560;
            margin-top: 2px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #7cad6e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ===== CHAT MESSAGES AREA ===== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #faf6ef;
        }

        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #d4c4a0;
            border-radius: 10px;
        }

        /* ===== MESSAGE BUBBLES ===== */
        .message {
            display: flex;
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            align-items: flex-start;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.bot .message-avatar {
            background: #f0e6d0;
            border: 1.5px solid #d4c4a0;
        }

        .message.user .message-avatar {
            background: #e8ddd0;
            border: 1.5px solid #c8b898;
        }

        .message-content {
            max-width: 75%;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.bot .message-bubble {
            background: #ffffff;
            color: #3d2e1e;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(180,150,100,0.10);
            border: 1px solid #ede4d4;
        }

        .message.user .message-bubble {
            background: #e8d5b0;
            color: #3d2e1e;
            border-bottom-right-radius: 4px;
            border: 1px solid #d4bc90;
        }

        /* ===== SOURCE BADGE ===== */
        .source-badge {
            display: inline-block;
            font-size: 0.72rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 5px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .source-badge.faq {
            background: #e6f4e0;
            color: #3a6b2e;
        }

        .source-badge.groq {
            background: #f0e8d8;
            color: #7a5c2e;
        }

        .confidence-text {
            font-size: 0.72rem;
            color: #a08060;
            margin-top: 3px;
            margin-left: 4px;
        }

        /* ===== TYPING INDICATOR ===== */
        .typing-indicator {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .typing-dots {
            background: #ffffff;
            padding: 12px 16px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(180,150,100,0.10);
            border: 1px solid #ede4d4;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #c4a882;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30%            { transform: translateY(-8px); }
        }

        /* ===== INPUT AREA ===== */
        .chat-input-area {
            padding: 20px 25px;
            background: #fff8ee;
            border-top: 1px solid #e8dfc8;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        #userInput {
            width: 100%;
            padding: 13px 18px;
            border: 2px solid #e0d0b8;
            border-radius: 25px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            resize: none;
            transition: border-color 0.2s;
            line-height: 1.4;
            max-height: 120px;
            overflow-y: auto;
            background: #fffdf9;
            color: #3d2e1e;
        }

        #userInput:focus {
            border-color: #c4a882;
        }

        #userInput::placeholder {
            color: #b0967a;
        }

        #sendBtn {
            width: 48px;
            height: 48px;
            background: #c4a882;
            border: none;
            border-radius: 50%;
            color: #fffdf9;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #sendBtn:hover {
            background: #a8885e;
            transform: scale(1.08);
        }

        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== WELCOME MESSAGE ===== */
        .welcome-message {
            text-align: center;
            padding: 20px;
            color: #8a7560;
        }

        .welcome-message h2 {
            font-size: 1.4rem;
            color: #4a3820;
            margin-bottom: 8px;
        }

        .welcome-message p {
            font-size: 0.9rem;
            margin-bottom: 16px;
            color: #7a6550;
        }

        /* ===== SUGGESTION CHIPS ===== */
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 12px;
        }

        .suggestion-chip {
            background: #fffdf9;
            border: 1.5px solid #c4a882;
            color: #7a5c2e;
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .suggestion-chip:hover {
            background: #c4a882;
            color: #fffdf9;
        }
</style>
</head>
<body>
    <div class="chat-container">

        <!-- HEADER -->
        <div class="chat-header">
            <div class="bot-avatar">🎓</div>
            <div class="header-info">
                <h1>EduBot</h1>
                <p><span class="status-dot"></span>College Assistant — Always Online</p>
            </div>
        </div>

        <!-- MESSAGES AREA -->
        <div class="chat-messages" id="chatMessages">
            <!-- Welcome message shown at start -->
            <div class="welcome-message">
                <h2>👋 Hi! I'm EduBot</h2>
                <p>Your 24/7 college assistant. Ask me anything about exams, fees, hostel, library, placements, and more!</p>
                <div class="suggestions">
                    <button class="suggestion-chip" onclick="sendSuggestion(this)">📅 Exam schedule</button>
                    <button class="suggestion-chip" onclick="sendSuggestion(this)">💰 Fee payment deadline</button>
                    <button class="suggestion-chip" onclick="sendSuggestion(this)">🏠 Hostel facilities</button>
                    <button class="suggestion-chip" onclick="sendSuggestion(this)">📚 Library timings</button>
                    <button class="suggestion-chip" onclick="sendSuggestion(this)">🎓 Placement companies</button>
                    <button class="suggestion-chip" onclick="sendSuggestion(this)">📋 Attendance rules</button>
                </div>
            </div>
        </div>

        <!-- INPUT AREA -->
        <div class="chat-input-area">
            <div class="input-wrapper">
                <textarea
                    id="userInput"
                    placeholder="Ask me anything about college..."
                    rows="1"
                ></textarea>
            </div>
            <button id="sendBtn" onclick="sendMessage()">➤</button>
        </div>

    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // Auto-resize textarea as user types
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Send message on Enter key (Shift+Enter for new line)
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();  // Prevent newline
                sendMessage();
            }
        });

        // Handle suggestion chip clicks
        function sendSuggestion(chip) {
            userInput.value = chip.textContent.trim();
            sendMessage();
        }

        // Scroll chat to bottom
        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Add a message bubble to the chat
        function addMessage(text, sender, source, confidence, matchedQ) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            const avatar = sender === 'bot' ? '🎓' : '👤';

            let metaHTML = '';
            if (sender === 'bot' && source) {
                // Show FAQ or Groq badge
                const badgeClass = source === 'faq' ? 'faq' : 'groq';
                const badgeText = source === 'faq' ? '📋 FAQ Match' : '🤖 AI Generated';
                metaHTML += `<span class="source-badge ${badgeClass}">${badgeText}</span>`;

                // Show confidence if available
                if (confidence !== null && confidence !== undefined) {
                    metaHTML += `<span class="confidence-text">Confidence: ${confidence}%</span>`;
                }
            }

            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
                    <div class="message-bubble">${text}</div>
                    ${metaHTML ? `<div style="margin-top:5px">${metaHTML}</div>` : ''}
                </div>
            `;

            chatMessages.appendChild(messageDiv);
            scrollToBottom();
        }

        // Show animated typing indicator while waiting for response
        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-avatar" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;">🎓</div>
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatMessages.appendChild(typingDiv);
            scrollToBottom();
        }

        // Remove typing indicator
        function hideTyping() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        // Main function — sends message to Flask and displays response
        async function sendMessage() {
            const question = userInput.value.trim();
            if (!question) return;

            // Show user message
            addMessage(question, 'user');

            // Clear input and disable button while waiting
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.disabled = true;

            // Show typing animation
            showTyping();

            try {
                // Send POST request to Flask /chat route
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question })
                });

                const data = await response.json();

                // Remove typing indicator
                hideTyping();

                // Show bot response with source badge
                addMessage(
                    data.answer,
                    'bot',
                    data.source,
                    data.confidence,
                    data.matched_question
                );

            } catch (error) {
                hideTyping();
                addMessage(
                    'Sorry, something went wrong. Please try again.',
                    'bot',
                    null, null, null
                );
            }

            // Re-enable send button
            sendBtn.disabled = false;
            userInput.focus();
        }
    </script>
</body>
</html>
