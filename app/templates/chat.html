<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBot — College Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        /* ===== CSS VARIABLES ===== */
        :root {
            --pink-deep:    #e91e8c;
            --pink-mid:     #f06292;
            --pink-light:   #fce4ec;
            --pink-pale:    #fff0f6;
            --pink-soft:    #ffd6e8;
            --white:        #ffffff;
            --off-white:    #fffafc;
            --text-dark:    #2d1a24;
            --text-mid:     #7a4d63;
            --text-light:   #b08090;
            --border:       #f5c6db;
            --shadow:       rgba(233,30,140,0.10);
        }

        /* ===== RESET ===== */
        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        .bg-scene {
            position: fixed;
            inset: 0;
            background: linear-gradient(145deg, #fff0f6 0%, #ffffff 50%, #fce4ec 100%);
            z-index: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0;
        }

        /* Decorative blobs */
        .bg-scene::before {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(240,98,146,0.12) 0%, transparent 70%);
            top: -100px; left: -100px;
            border-radius: 50%;
            animation: blobFloat 8s ease-in-out infinite;
        }

        .bg-scene::after {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(233,30,140,0.08) 0%, transparent 70%);
            bottom: -80px; right: -80px;
            border-radius: 50%;
            animation: blobFloat 10s ease-in-out infinite reverse;
        }

        @keyframes blobFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50%       { transform: translate(30px, 20px) scale(1.08); }
        }

        /* ===== FAQ TICKER ROWS ===== */
        .ticker-section {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 18px;
            pointer-events: none;
            z-index: 1;
        }

        .ticker-row {
            display: flex;
            width: 100%;
            overflow: hidden;
            mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
        }

        .ticker-track {
            display: flex;
            gap: 20px;
            white-space: nowrap;
            will-change: transform;
        }

        /* Row 1 scrolls left */
        .ticker-row:nth-child(1) .ticker-track {
            animation: scrollLeft 35s linear infinite;
        }

        /* Row 2 scrolls right */
        .ticker-row:nth-child(2) .ticker-track {
            animation: scrollRight 40s linear infinite;
        }

        /* Row 3 scrolls left again, slightly faster */
        .ticker-row:nth-child(3) .ticker-track {
            animation: scrollLeft 30s linear infinite;
        }

        @keyframes scrollLeft {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @keyframes scrollRight {
            0%   { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }

        .ticker-pill {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 18px;
            border-radius: 30px;
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.2px;
            color: var(--text-mid);
            flex-shrink: 0;
        }

        /* Alternating pill styles */
        .ticker-pill.style-a {
            background: rgba(255,255,255,0.7);
            border: 1.5px solid var(--border);
        }

        .ticker-pill.style-b {
            background: rgba(252,228,236,0.6);
            border: 1.5px solid rgba(240,98,146,0.25);
            color: var(--pink-deep);
        }

        .ticker-pill.style-c {
            background: rgba(255,255,255,0.5);
            border: 1.5px dashed var(--border);
        }

        /* ===== PAGE LAYOUT ===== */
        .page {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        /* ===== CHAT CONTAINER ===== */
        .chat-container {
            width: 100%;
            max-width: 720px;
            height: min(88vh, 780px);
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow:
                0 4px 6px rgba(233,30,140,0.04),
                0 20px 60px rgba(233,30,140,0.12),
                0 0 0 1px rgba(255,255,255,0.8) inset;
            border: 1.5px solid rgba(245,198,219,0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        .chat-header {
            padding: 18px 22px;
            background: var(--white);
            border-bottom: 1.5px solid var(--border);
            display: flex;
            align-items: center;
            gap: 13px;
            flex-shrink: 0;
        }

        .bot-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--pink-mid), var(--pink-deep));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(233,30,140,0.25);
        }

        .header-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--text-dark);
            line-height: 1;
        }

        .header-text p {
            font-size: 0.78rem;
            color: var(--text-light);
            margin-top: 3px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 7px; height: 7px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
            50%       { opacity: 0.7; box-shadow: 0 0 0 4px rgba(74,222,128,0); }
        }

        /* ===== MESSAGES AREA ===== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: var(--off-white);
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--pink-soft);
            border-radius: 4px;
        }

        /* ===== WELCOME BLOCK ===== */
        .welcome-block {
            text-align: center;
            padding: 10px 10px 20px;
        }

        .welcome-emoji {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
        }

        .welcome-block h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .welcome-block p {
            font-size: 0.85rem;
            color: var(--text-light);
            line-height: 1.5;
            max-width: 380px;
            margin: 0 auto 16px;
        }

        /* ===== SUGGESTION CHIPS ===== */
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            justify-content: center;
        }

        .chip {
            background: var(--white);
            border: 1.5px solid var(--border);
            color: var(--text-mid);
            padding: 6px 13px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.18s ease;
            font-weight: 500;
        }

        .chip:hover {
            background: var(--pink-light);
            border-color: var(--pink-mid);
            color: var(--pink-deep);
            transform: translateY(-1px);
        }

        /* ===== MESSAGE BUBBLES ===== */
        .message {
            display: flex;
            gap: 9px;
            animation: msgIn 0.25s ease;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 32px; height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .message.bot .msg-avatar {
            background: linear-gradient(135deg, var(--pink-mid), var(--pink-deep));
            box-shadow: 0 2px 8px rgba(233,30,140,0.2);
        }

        .message.user .msg-avatar {
            background: linear-gradient(135deg, #f8bbd0, #f48fb1);
        }

        .msg-body { max-width: 78%; display: flex; flex-direction: column; gap: 4px; }
        .message.user .msg-body { align-items: flex-end; }

        .msg-bubble {
            padding: 11px 15px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.55;
            word-break: break-word;
        }

        .message.bot .msg-bubble {
            background: var(--white);
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 8px var(--shadow);
        }

        .message.user .msg-bubble {
            background: linear-gradient(135deg, var(--pink-mid), var(--pink-deep));
            color: var(--white);
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 14px rgba(233,30,140,0.25);
        }

        /* ===== BADGES ===== */
        .msg-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 0.68rem;
            padding: 2px 8px;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        .badge.faq {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .badge.groq {
            background: var(--pink-light);
            color: var(--pink-deep);
        }

        .badge.system {
            background: #f3f4f6;
            color: #6b7280;
        }

        .conf-text {
            font-size: 0.68rem;
            color: var(--text-light);
        }

        /* ===== TYPING INDICATOR ===== */
        .typing {
            display: flex;
            gap: 9px;
            align-items: flex-end;
        }

        .typing-bubble {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            padding: 13px 16px;
            display: flex;
            gap: 5px;
            align-items: center;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .typing-bubble span {
            width: 7px; height: 7px;
            background: var(--pink-mid);
            border-radius: 50%;
            animation: typingBounce 1.1s infinite;
        }

        .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
        .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30%            { transform: translateY(-7px); opacity: 1; }
        }

        /* ===== INPUT AREA ===== */
        .chat-input-area {
            padding: 14px 18px;
            background: var(--white);
            border-top: 1.5px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        #userInput {
            flex: 1;
            padding: 11px 16px;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            background: var(--off-white);
            color: var(--text-dark);
            outline: none;
            resize: none;
            line-height: 1.4;
            max-height: 100px;
            overflow-y: auto;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #userInput:focus {
            border-color: var(--pink-mid);
            box-shadow: 0 0 0 3px rgba(240,98,146,0.12);
            background: var(--white);
        }

        #userInput::placeholder { color: var(--text-light); }

        #sendBtn {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--pink-mid), var(--pink-deep));
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.18s, box-shadow 0.18s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(233,30,140,0.3);
        }

        #sendBtn:hover:not(:disabled) {
            transform: scale(1.07) translateY(-1px);
            box-shadow: 0 6px 18px rgba(233,30,140,0.38);
        }

        #sendBtn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ===== RESPONSIVE — TABLET ===== */
        @media (max-width: 768px) {
            .page { padding: 10px; }

            .chat-container {
                height: 100vh;
                height: 100dvh;   /* dynamic viewport for mobile browsers */
                max-width: 100%;
                border-radius: 16px;
            }

            .chat-header { padding: 14px 16px; }

            .bot-avatar { width: 38px; height: 38px; font-size: 18px; border-radius: 11px; }

            .header-text h1 { font-size: 1.05rem; }

            .chat-messages { padding: 14px; gap: 12px; }

            .msg-body { max-width: 85%; }

            .welcome-block h2 { font-size: 1.15rem; }

            .chip { font-size: 0.74rem; padding: 5px 11px; }

            .ticker-section { gap: 14px; }

            .ticker-pill { font-size: 0.76rem; padding: 7px 14px; }
        }

        /* ===== RESPONSIVE — MOBILE ===== */
        @media (max-width: 480px) {
            .page { padding: 0; }

            .chat-container {
                border-radius: 0;
                height: 100vh;
                height: 100dvh;
                border: none;
                box-shadow: none;
            }

            .chat-header { padding: 12px 14px; gap: 10px; }

            .bot-avatar { width: 34px; height: 34px; font-size: 16px; border-radius: 9px; }

            .header-text h1 { font-size: 0.95rem; }
            .header-text p  { font-size: 0.72rem; }

            .chat-messages { padding: 12px; }

            .msg-bubble { font-size: 0.86rem; padding: 10px 13px; }

            .msg-avatar { width: 28px; height: 28px; font-size: 13px; border-radius: 8px; }

            .msg-body { max-width: 88%; }

            .welcome-emoji { font-size: 2rem; }
            .welcome-block h2 { font-size: 1rem; }
            .welcome-block p  { font-size: 0.8rem; }

            .suggestions { gap: 6px; }
            .chip { font-size: 0.72rem; padding: 5px 10px; }

            .chat-input-area { padding: 10px 12px; gap: 8px; }

            #userInput { font-size: 0.86rem; padding: 10px 14px; }

            #sendBtn { width: 40px; height: 40px; font-size: 1rem; border-radius: 12px; }

            /* Hide ticker on very small screens — reduces clutter */
            .ticker-section { display: none; }
        }

        /* ===== VERY SMALL SCREENS ===== */
        @media (max-width: 360px) {
            .header-text p { display: none; }  /* hide subtitle */
            .msg-body { max-width: 92%; }
        }
        /* ===== HEADER CREDIT ===== */
        .header-credit {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .header-credit span {
            font-size: 0.72rem;
            color: var(--text-light);
            white-space: nowrap;
        }

        .header-credit a {
            color: var(--text-light);
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }

        .header-credit a:hover {
            color: var(--pink-deep);
        }

        /* Hide credit text on small screens, keep icon */
        @media (max-width: 480px) {
            .header-credit span {
                display: none;
            }
        }
    </style>
</head>
<body>

<!-- ===== ANIMATED BACKGROUND ===== -->
<div class="bg-scene">
    <div class="ticker-section" id="tickerSection"></div>
</div>

<!-- ===== MAIN PAGE ===== -->
<div class="page">
    <div class="chat-container">

       <!-- HEADER -->
        <div class="chat-header">
            <div class="bot-avatar">🎓</div>
            <div class="header-text">
                <h1>EduBot</h1>
                <p><span class="status-dot"></span> College Assistant &mdash; Always Online</p>
            </div>
            <div class="header-credit">
                <span>Built by Hassan Valorwala</span>
                <a href="https://github.com/Hassan-valorwala/EduBot" target="_blank" title="View on GitHub">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
                    </svg>
                </a>
            </div>
        </div>

        <!-- MESSAGES -->
        <div class="chat-messages" id="chatMessages">
            <div class="welcome-block">
                <span class="welcome-emoji">👋</span>
                <h2>Hi, I'm EduBot!</h2>
                <p>Your 24/7 college assistant. Ask me about exams, fees, hostel, library, placements &amp; more.</p>
                <div class="suggestions" id="suggestions">
                    <button class="chip" onclick="useSuggestion(this)">📅 Exam schedule</button>
                    <button class="chip" onclick="useSuggestion(this)">💰 Fee deadline</button>
                    <button class="chip" onclick="useSuggestion(this)">🏠 Hostel info</button>
                    <button class="chip" onclick="useSuggestion(this)">📚 Library timings</button>
                    <button class="chip" onclick="useSuggestion(this)">🎓 Placement companies</button>
                    <button class="chip" onclick="useSuggestion(this)">📋 Attendance rules</button>
                </div>
            </div>
        </div>

        <!-- INPUT -->
        <div class="chat-input-area">
            <textarea id="userInput" rows="1" placeholder="Ask me anything about college..."></textarea>
            <button id="sendBtn" onclick="sendMessage()">➤</button>
        </div>

    </div>
</div>

<script>
    // ===== TICKER SETUP =====
    const tickerData = [
        // Row 1
        ["📅 When are end semester exams?", "💰 Fee payment deadline", "📚 Library working hours", "🏠 Hostel accommodation", "🎓 Placement companies", "📋 Minimum attendance"],
        // Row 2
        ["🏅 Scholarship applications", "📝 Revaluation process", "🏋️ Sports facilities", "🍽️ Canteen timings", "📄 Bonafide certificate", "💊 Medical leave policy"],
        // Row 3
        ["💻 Online journal access", "🤝 Internship opportunities", "🏦 Fee instalment plan", "📖 Books borrowing limit", "🎯 Branch change process", "⏰ College working hours"],
    ];

    const styles = ['style-a', 'style-b', 'style-c'];

    function buildTicker() {
        const section = document.getElementById('tickerSection');
        tickerData.forEach((rowItems, rowIdx) => {
            const row = document.createElement('div');
            row.className = 'ticker-row';

            // Duplicate items so the loop is seamless
            const allItems = [...rowItems, ...rowItems, ...rowItems, ...rowItems];
            const track = document.createElement('div');
            track.className = 'ticker-track';

            allItems.forEach((text, i) => {
                const pill = document.createElement('div');
                pill.className = `ticker-pill ${styles[(rowIdx + i) % styles.length]}`;
                pill.textContent = text;
                track.appendChild(pill);
            });

            row.appendChild(track);
            section.appendChild(row);
        });
    }

    buildTicker();

    // ===== CHAT LOGIC =====
    const chatMessages = document.getElementById('chatMessages');
    const userInput    = document.getElementById('userInput');
    const sendBtn      = document.getElementById('sendBtn');

    // Auto-resize textarea
    userInput.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });

    // Enter to send, Shift+Enter for newline
    userInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    function useSuggestion(chip) {
        userInput.value = chip.textContent.trim().replace(/^[\p{Emoji}\s]+/u, '').trim();
        sendMessage();
    }

    function scrollBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function addMessage(text, sender, source, confidence) {
        const wrap = document.createElement('div');
        wrap.className = `message ${sender}`;

        const avatarEl = document.createElement('div');
        avatarEl.className = 'msg-avatar';
        avatarEl.textContent = sender === 'bot' ? '🎓' : '👤';

        const body = document.createElement('div');
        body.className = 'msg-body';

        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.textContent = text;
        body.appendChild(bubble);

        // Badge + confidence for bot messages
        if (sender === 'bot' && source && source !== 'system') {
            const meta = document.createElement('div');
            meta.className = 'msg-meta';

            const badge = document.createElement('span');
            badge.className = `badge ${source}`;
            badge.textContent = source === 'faq' ? '📋 FAQ Match' : '🤖 AI Generated';
            meta.appendChild(badge);

            if (confidence !== null && confidence !== undefined) {
                const conf = document.createElement('span');
                conf.className = 'conf-text';
                conf.textContent = `${confidence}% confidence`;
                meta.appendChild(conf);
            }
            body.appendChild(meta);
        }

        wrap.appendChild(avatarEl);
        wrap.appendChild(body);
        chatMessages.appendChild(wrap);
        scrollBottom();
    }

    function showTyping() {
        const wrap = document.createElement('div');
        wrap.className = 'typing';
        wrap.id = 'typingIndicator';

        const av = document.createElement('div');
        av.className = 'msg-avatar';
        av.style.cssText = 'background:linear-gradient(135deg,#f06292,#e91e8c);box-shadow:0 2px 8px rgba(233,30,140,0.2)';
        av.textContent = '🎓';

        const bbl = document.createElement('div');
        bbl.className = 'typing-bubble';
        bbl.innerHTML = '<span></span><span></span><span></span>';

        wrap.appendChild(av);
        wrap.appendChild(bbl);
        chatMessages.appendChild(wrap);
        scrollBottom();
    }

    function hideTyping() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
    }

    async function sendMessage() {
        const question = userInput.value.trim();
        if (!question) return;

        // Hide suggestion chips after first message
        const suggestions = document.getElementById('suggestions');
        if (suggestions) suggestions.style.display = 'none';

        addMessage(question, 'user');
        userInput.value = '';
        userInput.style.height = 'auto';
        sendBtn.disabled = true;
        showTyping();

        try {
            const res  = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question })
            });
            const data = await res.json();
            hideTyping();
            addMessage(data.answer, 'bot', data.source, data.confidence);
        } catch {
            hideTyping();
            addMessage('Sorry, something went wrong. Please try again.', 'bot', 'system', null);
        }

        sendBtn.disabled = false;
        userInput.focus();
    }
</script>
</body>
</html>
